<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer un compte - Moody</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="page-transition">
  <div class="loader">
    <div class="loader__content">
      <div class="loader__spinner"></div>
      <p class="loader__text">Chargement...</p>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <div class="auth-page">
    <div class="auth-card scale-in">
      <div class="auth-card__header">
        <div class="auth-card__icon">
          <i class="bi bi-person-plus-fill"></i>
        </div>
        <h1 class="auth-card__title">Créer un compte</h1>
        <p class="auth-card__subtitle">Rejoignez la communauté Moody</p>
      </div>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label for="username">
            <i class="bi bi-person-fill"></i> Nom d'utilisateur
          </label>
          <input type="text" id="username" class="form-control" required placeholder="Choisissez un nom">
        </div>

        <div class="form-group">
          <label for="password">
            <i class="bi bi-lock-fill"></i> Mot de passe
          </label>
          <input type="password" id="password" class="form-control" required placeholder="Créez un mot de passe">
        </div>

        <div class="form-group">
          <label for="confirm-password">
            <i class="bi bi-shield-check"></i> Confirmer le mot de passe
          </label>
          <input type="password" id="confirm-password" class="form-control" required placeholder="Confirmez votre mot de passe">
        </div>

        <div class="form-group">
          <label>
            <i class="bi bi-emoji-smile"></i> Choisissez votre avatar
          </label>
          <div class="avatar-grid" style="display: flex; gap: 0.75rem; margin-top: 0.5rem; flex-wrap: wrap; justify-content: center;">
            <button type="button" class="avatar-btn active" data-avatar="😊">
              <i class="bi bi-emoji-smile"></i>
            </button>
            <button type="button" class="avatar-btn" data-avatar="😎">
              <i class="bi bi-emoji-sunglasses"></i>
            </button>
            <button type="button" class="avatar-btn" data-avatar="🌟">
              <i class="bi bi-star-fill"></i>
            </button>
            <button type="button" class="avatar-btn" data-avatar="💪">
              <i class="bi bi-lightning-charge-fill"></i>
            </button>
            <button type="button" class="avatar-btn" data-avatar="🎉">
              <i class="bi bi-balloon-fill"></i>
            </button>
            <button type="button" class="avatar-btn" data-avatar="🤗">
              <i class="bi bi-heart-fill"></i>
            </button>
          </div>
          <input type="hidden" id="avatar" value="😊">
        </div>

        <button type="submit" class="btn btn--block ripple">
          <i class="bi bi-person-plus"></i> S'inscrire
        </button>
      </form>

      <div class="auth-card__footer">
        <p>Déjà un compte? <a href="login.html">Se connecter</a></p>
      </div>
    </div>
  </div>

  <script src="assets/js/script.js"></script>
  <script>
    document.querySelectorAll('.avatar-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.avatar-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.getElementById('avatar').value = this.dataset.avatar;
      });
    });

    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container') || createToastContainer();
      const icons = { success: 'check-circle-fill', error: 'x-circle-fill', info: 'info-circle-fill' };
      
      const toast = document.createElement('div');
      toast.className = `toast toast--${type}`;
      toast.innerHTML = `
        <i class="bi bi-${icons[type] || 'info-circle-fill'} toast__icon"></i>
        <span class="toast__content">${message}</span>
        <button class="toast__close" onclick="this.parentElement.remove()">
          <i class="bi bi-x-lg"></i>
        </button>
      `;
      
      container.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 400);
      }, 4000);
    }

    function createToastContainer() {
      const container = document.createElement('div');
      container.id = 'toast-container';
      container.className = 'toast-container';
      document.body.appendChild(container);
      return container;
    }

    document.getElementById('register-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const confirmPassword = document.getElementById('confirm-password').value.trim();
      const avatar = document.getElementById('avatar').value;

      if (!username || !password) {
        showToast('Veuillez remplir tous les champs', 'error');
        return;
      }

      if (password !== confirmPassword) {
        showToast('Les mots de passe ne correspondent pas', 'error');
        document.getElementById('confirm-password').classList.add('shake');
        setTimeout(() => document.getElementById('confirm-password').classList.remove('shake'), 400);
        return;
      }

      if (password.length < 4) {
        showToast('Le mot de passe doit contenir au moins 4 caractères', 'error');
        return;
      }

      const users = JSON.parse(localStorage.getItem('users')) || [];
      if (users.find(u => u.name === username)) {
        showToast('Ce nom d\'utilisateur est déjà pris', 'error');
        return;
      }

      const newUser = { name: username, password: password, avatar: avatar, coins: 0, helped: 0, victories: [] };
      users.push(newUser);
      localStorage.setItem('users', JSON.stringify(users));
      
      localStorage.setItem('currentUser', JSON.stringify(newUser));
      showToast('Compte créé avec succès !', 'success');
      
      setTimeout(() => window.location.href = 'index.html', 1500);
    });
  </script>
</body>
</html>
