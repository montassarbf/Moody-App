<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Moody</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="page-transition">
  <div class="loader">
    <div class="loader__content">
      <div class="loader__spinner"></div>
      <p class="loader__text">Chargement...</p>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <div class="auth-page">
    <div class="auth-card scale-in">
      <div class="auth-card__header">
        <div class="auth-card__icon">
          <i class="bi bi-stars"></i>
        </div>
        <h1 class="auth-card__title">Se connecter</h1>
        <p class="auth-card__subtitle">Bienvenue sur Moody</p>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="username">
            <i class="bi bi-person-fill"></i> Nom d'utilisateur
          </label>
          <input type="text" id="username" class="form-control" required placeholder="Votre nom">
        </div>

        <div class="form-group">
          <label for="password">
            <i class="bi bi-lock-fill"></i> Mot de passe
          </label>
          <input type="password" id="password" class="form-control" required placeholder="Votre mot de passe">
        </div>

        <button type="submit" class="btn btn--block ripple">
          <i class="bi bi-box-arrow-in-right"></i> Se connecter
        </button>
      </form>

      <div class="auth-card__footer">
        <p>Pas encore de compte? <a href="register.html">Créer un compte</a></p>
      </div>
    </div>
  </div>

  <script src="assets/js/script.js"></script>
</body>
</html>
