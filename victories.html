<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Victoires - Moody</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="page-transition">
  <div class="loader">
    <div class="loader__content">
      <div class="loader__spinner"></div>
      <p class="loader__text">Chargement...</p>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <main class="container">
    <a href="index.html" class="back-link fade-in">
      <i class="bi bi-arrow-left"></i> Retour à l'accueil
    </a>

    <header class="page-header fade-in">
      <div style="font-size: 4rem; margin-bottom: 0.5rem; color: var(--color-primary);">
        <i class="bi bi-trophy-fill"></i>
      </div>
      <h1>Mes Victoires</h1>
      <p>Célébrez vos succès, petits ou grands</p>
    </header>

    <div class="card fade-in stagger-1">
      <h2 class="card__title" style="margin-bottom: 1rem;">
        <i class="bi bi-crosshair"></i> Ajouter une victoire
      </h2>
      <div class="comment-input-group">
        <input type="text" id="victory-input" class="form-control" placeholder="Décrivez votre victoire...">
        <button id="add-victory-btn" class="btn ripple">
          <i class="bi bi-plus-lg"></i> Ajouter
        </button>
      </div>
    </div>

    <div id="victory-list" class="victory-list" style="margin-top: 2rem;"></div>

    <div style="text-align: center; margin-top: 2rem;" class="fade-in stagger-2">
      <a href="index.html" class="btn btn--secondary ripple">
        <i class="bi bi-arrow-left"></i> Retour à l'accueil
      </a>
    </div>
  </main>

  <script src="assets/js/victories.js"></script>
</body>
</html>
